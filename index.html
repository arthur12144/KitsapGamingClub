<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitsap Gaming Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 60px;
      gap: 28px;
    }

.logo-wrapper {
  width: clamp(80px, 25vw, 500px);
  height: clamp(80px, 25vw, 500px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrapper img {
      width: 500%;
      height: 500%;
      object-fit: contain;
    }

    .club-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 5vw, 3rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
    }

    .tagline {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 300;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #aaa;
      text-align: center;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #fff;
      margin-top: 8px;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-wrapper">
      <img src="KGClogo.jpg" alt="Kitsap Gaming Club Logo" />
    </div>
    <div>
      <h1 class="club-name">Kitsap Gaming Club</h1>
      <div class="divider"></div>
    </div>
    <p class="tagline">Play games, Embrace your weirdness, Snuggle with dogs</p>
  </header>
</body>
</html>
